<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inventory - Last 7 Days</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; max-width: 100%; max-height: 100%; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
<canvas id="pdf-canvas"></canvas>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  function renderPDF() {
    var url = 'inventory-last7.pdf?t=' + Date.now();
    pdfjsLib.getDocument(url).promise.then(function(pdf) {
      pdf.getPage(1).then(function(page) {
        var canvas = document.getElementById('pdf-canvas');
        var context = canvas.getContext('2d');
        var viewport = page.getViewport({ scale: 1 });
        var renderScale = 4;
        var fitScale = Math.min(window.innerWidth / viewport.width, window.innerHeight / viewport.height);
        viewport = page.getViewport({ scale: fitScale * renderScale });
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        canvas.style.width = (viewport.width / renderScale) + 'px';
        canvas.style.height = (viewport.height / renderScale) + 'px';
        page.render({ canvasContext: context, viewport: viewport });
      });
    });
  }
  renderPDF();
  setInterval(renderPDF, 900000);
</script>
</body>
</html>
